name: 1. Setup Vendor & Device Tree

on:
  workflow_dispatch:

env:
  VENDOR_REPO: cipin23/vendorgw
  VENDOR_RELEASE: v0.1

jobs:
  setup-trees:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
    - name: Checkout this repo (device tree target)
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        path: out_repo

    - name: Clone vendor blobs repo
      run: |
        git clone --depth=1 https://github.com/$VENDOR_REPO.git vendor_src
        echo "[+] vendor_src contents:"
        ls vendor_src/

    - name: Install Python deps
      run: pip install --quiet pathlib

    - name: Generate vendor tree
      run: |
        rm -rf out_repo/vendor/samsung/a02
        mkdir -p out_repo/vendor/samsung/a02

        # Blobs ada di vendor_src/vendor/
        rsync -a vendor_src/vendor/ out_repo/vendor/samsung/a02/

        echo "[+] Blob count: $(find out_repo/vendor/samsung/a02 -type f | wc -l)"

        # Generate Android.bp + Android.mk dari blobs
        python3 out_repo/scripts/setup/setup_vendor.py \
          --src out_repo/vendor/samsung/a02 \
          --dst out_repo/vendor/samsung/a02

    - name: Generate device tree
      run: |
        mkdir -p out_repo/device/samsung/a02
        python3 out_repo/scripts/setup/gen_device_tree.py \
          --vendor-src vendor_src \
          --out out_repo/device/samsung/a02

    - name: Copy zImage to device prebuilt
      run: |
        mkdir -p out_repo/device/samsung/a02/prebuilt
        cp vendor_src/zImage out_repo/device/samsung/a02/prebuilt/zImage
        echo "[+] zImage: $(ls -lh out_repo/device/samsung/a02/prebuilt/zImage)"

    - name: Commit & push trees
      run: |
        cd out_repo
        git config user.email "bot@arrow.local"
        git config user.name "Arrow Tree Bot"
        git add vendor/samsung/a02 device/samsung/a02
        git status
        git diff --cached --stat
        git commit -m "chore: add vendor & device tree for SM-A022F (MT6739)

        - vendor/samsung/a02: blobs + Android.bp + Android.mk
        - device/samsung/a02: BoardConfig, device.mk, manifest.xml, overlay
        - prebuilt/zImage from $VENDOR_RELEASE" || echo "Nothing to commit"
        git push
