name: 1. Setup Vendor & Device Tree

on:
  workflow_dispatch:

env:
  VENDOR_REPO: cipin23/vendorgw
  VENDOR_RELEASE: v0.1

jobs:
  setup-trees:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        path: out_repo

    - name: Clone vendor blobs repo
      run: git clone --depth=1 https://github.com/$VENDOR_REPO.git vendor_src

    - name: Generate vendor tree
      run: |
        python3 out_repo/scripts/setup/setup_vendor.py --src out_repo/vendor/samsung/a02
        
        # Generate Device Tree
        python3 out_repo/scripts/setup/gen_device_tree.py \
          --vendor-src vendor_src \
          --out out_repo/device/samsung/a02

    - name: Copy zImage
      run: |
        mkdir -p out_repo/device/samsung/a02/prebuilt
        cp vendor_src/zImage out_repo/device/samsung/a02/prebuilt/zImage

    - name: Commit & Push
      run: |
        cd out_repo
        git config user.email "bot@arrow.local"
        git config user.name "Arrow Tree Bot"
        git add .
        git commit -m "Update vendor and device trees [skip ci]" || exit 0
        git push
