name: Operasi Bedah Services Jar

on:
  workflow_dispatch:

jobs:
  patch-audio-broker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip
          # Download smali & baksmali
          wget https://repo1.maven.org/maven2/org/smali/baksmali/2.5.2/baksmali-2.5.2.jar -O baksmali.jar
          wget https://repo1.maven.org/maven2/org/smali/smali/2.5.2/smali-2.5.2.jar -O smali.jar

      - name: Disassemble Patients & Donors
        run: |
          mkdir -p out/arrowos out/crdroid
          # Panggil class main-nya langsung biar gak error manifest
          java -cp baksmali.jar org.jf.baksmali.Main d files/arrowos_services.jar -o out/arrowos/services_smali/ [cite: 3, 8]
          java -cp baksmali.jar org.jf.baksmali.Main d files/crdroid_services.jar -o out/crdroid/services_smali/ 

      - name: Patching Logic (Transplantasi)
        run: |
          TARGET="out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali"
          
          # Update Method Signature [cite: 3]
          [cite_start]sed -i 's/removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;)V/removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;I)V/g' $TARGET [cite: 3]
          
          # Update .registers [cite: 3]
          [cite_start]sed -i '/removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;I)V/,/\.registers/ s/\.registers 10/\.registers 11/' $TARGET [cite: 3]

          # Ganti 0x0 ke p2 (codec) [cite: 3, 4, 5]
          [cite_start]sed -i 's/const\/4 v5, 0x0/move v5, p2/g' $TARGET [cite: 4, 5]

          # Patch Caller (p3 as codec register) 
          [cite_start]sed -i 's/invoke-direct {p0, p1}, Lcom\/android\/server\/audio\/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;)V/invoke-direct {p0, p1, p3}, Lcom\/android\/server\/audio\/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;I)V/g' $TARGET [cite: 6]

      - name: Reassemble & Package
        run: |
          cd out/arrowos/
          # Panggil class main smali buat assemble 
          java -cp ../../smali.jar org.jf.smali.Main a services_smali/ -o classes.dex 
          cp ../../files/arrowos_services.jar arrowos_services_patched.jar
          zip -u arrowos_services_patched.jar classes.dex

      - name: Upload Patched Result
        uses: actions/upload-artifact@v4
        with:
          name: ArrowOS-Services-Patched
          path: out/arrowos/arrowos_services_patched.jar
