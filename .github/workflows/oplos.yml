name: Operasi Bedah Services Jar

on:
  workflow_dispatch:

jobs:
  patch-audio-broker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java & Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip unzip wget
          # Download smali & baksmali sebagai executable jar
          # Pakai GitHub Releases fat jar, bukan Maven (Maven gak punya executable jar)
          wget -q "https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat.jar" -O baksmali.jar
          wget -q "https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat.jar" -O smali.jar
          java -jar baksmali.jar --version
          java -jar smali.jar --version

      - name: Disassemble Patients & Donors
        run: |
          mkdir -p out/arrowos out/crdroid
          # Pakai java -jar bukan -cp, ini yang bikin error sebelumnya
          java -jar baksmali.jar d files/arrowos_services.jar -o out/arrowos/services_smali/
          java -jar baksmali.jar d files/crdroid_services.jar -o out/crdroid/services_smali/

      - name: Verify Target File Exists
        run: |
          TARGET="out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali"
          if [ ! -f "$TARGET" ]; then
            echo "❌ ERROR: AudioDeviceBroker.smali tidak ditemukan!"
            echo "Isi folder audio:"
            find out/arrowos/services_smali/com/android/server/audio/ -name "*.smali" || echo "(folder tidak ada)"
            exit 1
          fi
          echo "✅ Target ditemukan: $TARGET"
          # Tampilkan method signature asli buat debug
          grep -n "removeScheduledA2dpEvents" "$TARGET" || echo "(method tidak ditemukan, cek nama method)"

      - name: Patching Logic (Transplantasi AudioDeviceBroker)
        run: |
          TARGET="out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali"

          # Backup dulu sebelum dioperasi
          cp "$TARGET" "${TARGET}.bak"

          # 1. Update Method Signature: tambah parameter int (codec)
          sed -i 's/\.method.*removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;)V/.method private removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;I)V/g' "$TARGET"

          # 2. Update .registers: naikan 1 buat tampung param baru
          # Cari block method removeScheduledA2dpEvents dan patch .registers di dalamnya
          python3 - <<'PYEOF'
          import re

          with open("out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali", "r") as f:
              content = f.read()

          # Tambah register di method removeScheduledA2dpEvents yang sudah dipatch
          # Pattern: cari method signature baru, lalu .registers N -> .registers N+1
          def bump_registers(match):
              block = match.group(0)
              def inc_reg(m):
                  n = int(m.group(1))
                  return f".registers {n + 1}"
              return re.sub(r'\.registers (\d+)', inc_reg, block, count=1)

          content = re.sub(
              r'(\.method private removeScheduledA2dpEvents\(Landroid/bluetooth/BluetoothDevice;I\)V.*?\.end method)',
              bump_registers,
              content,
              flags=re.DOTALL
          )

          with open("out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali", "w") as f:
              f.write(content)

          print("✅ .registers berhasil di-bump")
          PYEOF

          # 3. Ganti const/4 v5, 0x0 -> move v5, p2 (pakai codec dari parameter)
          sed -i 's/const\/4 v5, 0x0/move v5, p2/g' "$TARGET"

          # 4. Patch semua caller internal yang invoke method lama (tanpa codec param)
          sed -i 's/invoke-direct {p0, p1}, Lcom\/android\/server\/audio\/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;)V/invoke-direct {p0, p1, p3}, Lcom\/android\/server\/audio\/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid\/bluetooth\/BluetoothDevice;I)V/g' "$TARGET"

          echo "✅ Patch selesai, diff hasil operasi:"
          diff "${TARGET}.bak" "$TARGET" || true

      - name: Reassemble & Package
        run: |
          cd out/arrowos/
          # Pakai java -jar untuk smali juga
          java -jar ../../smali.jar a services_smali/ -o classes.dex
          echo "✅ classes.dex size: $(du -sh classes.dex)"

          cp ../../files/arrowos_services.jar arrowos_services_patched.jar
          # Update classes.dex di dalam jar
          zip -u arrowos_services_patched.jar classes.dex
          echo "✅ Jar patched: $(du -sh arrowos_services_patched.jar)"

      - name: Upload Patched Result
        uses: actions/upload-artifact@v4
        with:
          name: ArrowOS-Services-Patched
          path: out/arrowos/arrowos_services_patched.jar
          retention-days: 7
