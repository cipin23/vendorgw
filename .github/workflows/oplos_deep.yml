name: Operasi Bedah Services Jar (Delegation Method - Aman Total)

on:
  workflow_dispatch:

jobs:
  delegation-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java & Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip unzip wget python3
          wget -q "https://github.com/baksmali/smali/releases/download/3.0.9/baksmali-3.0.9-fat.jar" -O baksmali.jar
          wget -q "https://github.com/baksmali/smali/releases/download/3.0.9/smali-3.0.9-fat.jar" -O smali.jar

      - name: Disassemble ArrowOS Services
        run: |
          mkdir -p out/arrowos
          java -jar baksmali.jar d files/arrowos_services.jar -o out/arrowos/services_smali/

      - name: Tambah Method Delegasi (dengan parameter int)
        run: |
          TARGET="out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali"
          
          cat > add_delegation.py << 'PYTHON_SCRIPT'
          import re
          import sys
          
          file_path = "out/arrowos/services_smali/com/android/server/audio/AudioDeviceBroker.smali"
          with open(file_path, 'r') as f:
              content = f.read()
          
          # Cek apakah method dengan parameter int sudah ada (biar gak dobel)
          if 'removeScheduledA2dpEvents(Landroid/bluetooth/BluetoothDevice;I)V' in content:
              print("⚠️ Method dengan int sudah ada, skip penambahan")
              sys.exit(0)
          
          # Cari method asli (tanpa int) untuk dijadikan target delegasi
          # Kita akan inject method baru setelah method asli
          old_method_pattern = r'(\.method (?:public|private|protected) removeScheduledA2dpEvents\(Landroid/bluetooth/BluetoothDevice;\)V.*?\.end method)'
          match = re.search(old_method_pattern, content, re.DOTALL)
          if not match:
              print("❌ Method asli tidak ditemukan")
              sys.exit(1)
          
          old_method_block = match.group(0)
          
          # Buat method delegasi
          delegation_method = '''
      .method private removeScheduledA2dpEvents(Landroid/bluetooth/BluetoothDevice;I)V
          .registers 3
          .param p1, "device"  # Landroid/bluetooth/BluetoothDevice;
          .param p2, "codec"   # I (tidak dipakai)
          
          invoke-direct {p0, p1}, Lcom/android/server/audio/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid/bluetooth/BluetoothDevice;)V
          
          return-void
      .end method
          '''
          
          # Inject delegation method tepat setelah method asli
          new_content = content.replace(old_method_block, old_method_block + delegation_method)
          
          with open(file_path, 'w') as f:
              f.write(new_content)
          
          print("✅ Method delegasi berhasil ditambahkan")
          PYTHON_SCRIPT
          
          python3 add_delegation.py

      - name: Patch Semua Caller ke Method dengan Parameter Int
        run: |
          TARGET_DIR="out/arrowos/services_smali"
          cat > patch_callers.py << 'PYTHON_SCRIPT'
          import re
          import os
          import sys
          
          target_dir = sys.argv[1]
          for root, dirs, files in os.walk(target_dir):
              for file in files:
                  if not file.endswith('.smali'):
                      continue
                  filepath = os.path.join(root, file)
                  with open(filepath, 'r') as f:
                      content = f.read()
                  
                  # Cek apakah ada invoke ke method lama (tanpa int)
                  if 'removeScheduledA2dpEvents(Landroid/bluetooth/BluetoothDevice;)V' not in content:
                      continue
                  
                  print(f"Patching: {filepath}")
                  backup = filepath + '.bak'
                  with open(backup, 'w') as f:
                      f.write(content)
                  
                  # Ubah signature invoke jadi pake int, tambah register v0
                  pattern = r'(invoke-(?:virtual|direct|static|interface)\s+\{([^}]+)\},\s*Lcom/android/server/audio/AudioDeviceBroker;->removeScheduledA2dpEvents\(Landroid/bluetooth/BluetoothDevice;\)V)'
                  
                  def replacer(match):
                      args = match.group(2).strip()
                      new_args = args + ", v0"
                      return f'invoke-virtual {{{new_args}}}, Lcom/android/server/audio/AudioDeviceBroker;->removeScheduledA2dpEvents(Landroid/bluetooth/BluetoothDevice;I)V'
                  
                  new_content = re.sub(pattern, replacer, content)
                  
                  # Inject const/4 v0, 0x0 sebelum setiap invoke yang sudah diubah
                  lines = new_content.split('\n')
                  new_lines = []
                  for i, line in enumerate(lines):
                      new_lines.append(line)
                      if 'invoke-' in line and 'removeScheduledA2dpEvents' in line and '(Landroid/bluetooth/BluetoothDevice;I)V' in line:
                          if i > 0 and 'const/4 v0,' in lines[i-1]:
                              continue
                          new_lines.insert(i, '    const/4 v0, 0x0')
                  
                  with open(filepath, 'w') as f:
                      f.write('\n'.join(new_lines))
                  print(f"✅ Patched: {filepath}")
          PYTHON_SCRIPT
          
          python3 patch_callers.py "$TARGET_DIR"
          echo "✅ Semua caller dipatch ke method delegasi"

      - name: Reassemble & Package
        run: |
          cd out/arrowos/
          java -jar ../../smali.jar a services_smali/ -o classes.dex
          cp ../../files/arrowos_services.jar arrowos_services_patched.jar
          zip -u arrowos_services_patched.jar classes.dex
          echo "✅ Patched JAR siap: $(du -sh arrowos_services_patched.jar)"

      - name: Upload Patched Result
        uses: actions/upload-artifact@v4
        with:
          name: ArrowOS-Services-Patched-Delegation
          path: out/arrowos/arrowos_services_patched.jar
          retention-days: 7
