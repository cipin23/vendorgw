name: Sync Framework Jars from Google Drive

on:
  workflow_dispatch: # Biar bisa lo klik "Run workflow" manual dari tab Actions

jobs:
  download-frameworks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown

      - name: Download Frameworks from Google Drive
        run: |
          # GANTI <ID_FILE_1> dengan ID file arrowos_framework.jar lo
          gdown 13WDzen7QUqq5F4nvpnGGJTk5XCppH99z -O files/arrowos_framework.jar
          
          # GANTI <ID_FILE_2> dengan ID file crdroid_framework.jar lo
          gdown 1PALnDaTiooR2t3cwg9J4FGstHgtqG9Kz -O files/crdroid_framework.jar

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add files/*.jar
          git commit -m "Update framework jars from Google Drive" || echo "No changes to commit"
          git push
