name: Sync and Organize Jars

on:
  workflow_dispatch: # Jalankan manual dari tab Actions

jobs:
  organize-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown

      - name: Create Directory and Move Existing Jars
        run: |
          mkdir -p files
          # Pindahin services.jar yang udah ada di root ke folder files/
          # Pakai || true biar nggak error kalo filenya ternyata udah dipindah sebelumnya
          mv arrowos_services.jar files/ 2>/dev/null || true
          mv crdroid_services.jar files/ 2>/dev/null || true

      - name: Download Frameworks from Google Drive
        run: |
          # GANTI <ID_FILE_1> dengan ID file arrowos_framework.jar lo
          gdown --id <ID_FILE_1> -O files/arrowos_framework.jar
          
          # GANTI <ID_FILE_2> dengan ID file crdroid_framework.jar lo
          gdown --id <ID_FILE_2> -O files/crdroid_framework.jar

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add files/*.jar
          git commit -m "Move services jars to /files and sync framework jars from GDrive" || echo "No changes to commit"
          git push
