name: Build ArrowOS system.img - A02

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Check Storage
        run: df -h

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libncurses5 x11proto-core-dev \
            libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
            xsltproc unzip fontconfig bc cpio libssl-dev \
            python3 python3-pip rsync

      - name: Setup repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.email "build@github.com"
          git config --global user.name "GH Actions"
          git config --global color.ui false

      - name: Repo Init + Sync ArrowOS
        run: |
          mkdir -p /tmp/ARROW_SOURCE
          cd /tmp/ARROW_SOURCE
          repo init -u https://github.com/ArrowOS/android_manifest.git -b arrow-11.0 --depth=1
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Check Storage After Sync
        run: df -h

      - name: Setup Device Tree
        run: |
          DEVICE_TREE="/tmp/ARROW_SOURCE/device/samsung/a02"
          mkdir -p $DEVICE_TREE/prebuilt $DEVICE_TREE/vintf_fragments $DEVICE_TREE/sepolicy

          # Download zImage dari release
          gh release download v0.1 --repo cipin23/vendorgw -p "zImage" -D /tmp/ || true
          cp /tmp/zImage $DEVICE_TREE/prebuilt/zImage

          cat > $DEVICE_TREE/BoardConfig.mk << 'EOF'
          TARGET_ARCH := arm
          TARGET_ARCH_VARIANT := armv7-a-neon
          TARGET_CPU_ABI := armeabi-v7a
          TARGET_CPU_ABI2 := armeabi
          TARGET_CPU_VARIANT := generic
          TARGET_BOARD_PLATFORM := mt6739
          TARGET_BOOTLOADER_BOARD_NAME := k39tv1_bsp_titan_hamster

          BOARD_PREBUILT_KERNEL := device/samsung/a02/prebuilt/zImage
          TARGET_PREBUILT_KERNEL := $(BOARD_PREBUILT_KERNEL)
          TARGET_KERNEL_CONFIG := a02_defconfig

          BOARD_SUPER_PARTITION_SIZE := 1610612736
          BOARD_SUPER_PARTITION_GROUPS := samsung_dynamic_partitions
          BOARD_SAMSUNG_DYNAMIC_PARTITIONS_PARTITION_LIST := system vendor product
          BOARD_SAMSUNG_DYNAMIC_PARTITIONS_SIZE := 1602224128

          TARGET_USERIMAGES_USE_EXT4 := true
          TARGET_USERIMAGES_USE_F2FS := true
          BOARD_BOOTIMAGE_PARTITION_SIZE := 33554432
          BOARD_VENDORIMAGE_PARTITION_SIZE := 536870912
          BOARD_PRODUCTIMAGE_PARTITION_SIZE := 536870912
          BOARD_FLASH_BLOCK_SIZE := 131072
          BOARD_VENDORIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_PRODUCTIMAGE_FILE_SYSTEM_TYPE := ext4
          TARGET_COPY_OUT_VENDOR := vendor
          TARGET_COPY_OUT_PRODUCT := product

          TARGET_SCREEN_DENSITY := 300
          BOARD_SEPOLICY_DIRS += device/samsung/a02/sepolicy
          DEVICE_MANIFEST_FILE := device/samsung/a02/vintf_fragments/manifest.xml
          EOF

          cat > $DEVICE_TREE/arrow_a02.mk << 'EOF'
          $(call inherit-product, $(SRC_TARGET_DIR)/product/core_minimal.mk)
          $(call inherit-product, $(SRC_TARGET_DIR)/product/full_base_telephony.mk)
          $(call inherit-product, vendor/arrow/config/common.mk)
          $(call inherit-product-if-exists, vendor/samsung/a02/a02-vendor.mk)

          PRODUCT_NAME := arrow_a02
          PRODUCT_DEVICE := a02
          PRODUCT_BRAND := samsung
          PRODUCT_MANUFACTURER := samsung
          PRODUCT_MODEL := SM-A022F
          PRODUCT_USE_DYNAMIC_PARTITIONS := true

          PRODUCT_PROPERTY_OVERRIDES += \
              ro.sf.lcd_density=300 \
              ro.hardware.egl=mtk \
              ro.opengles.version=196610 \
              dalvik.vm.heapsize=512m \
              dalvik.vm.heapgrowthlimit=256m \
              ro.config.low_ram=true \
              ro.telephony.sim.count=2 \
              telephony.active_modems.max_count=2 \
              ro.vendor.radio.max.multisim=dsds \
              persist.vendor.radio.msimmode=dsds \
              ro.product.first_api_level=29 \
              ro.apex.updatable=true \
              drm.service.enabled=true \
              ro.hardware.keystore=mdfpp \
              ro.hardware.kmsetkey=trustonic \
              ro.surface_flinger.primary_display_orientation=ORIENTATION_0 \
              ro.surface_flinger.force_hwc_copy_for_virtual_displays=true \
              ro.surface_flinger.max_frame_buffer_acquired_buffers=3
          EOF

          cat > $DEVICE_TREE/AndroidProducts.mk << 'EOF'
          PRODUCT_MAKEFILES := \
              $(LOCAL_DIR)/arrow_a02.mk

          COMMON_LUNCH_CHOICES := \
              arrow_a02-userdebug \
              arrow_a02-user \
              arrow_a02-eng
          EOF

          echo 'LOCAL_PATH := $(call my-dir)' > $DEVICE_TREE/Android.mk
          echo '<manifest version="1.0" type="device"></manifest>' > $DEVICE_TREE/vintf_fragments/manifest.xml

      - name: Setup Vendor Tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEVICE_VENDOR="/tmp/ARROW_SOURCE/vendor/samsung/a02"
          mkdir -p $DEVICE_VENDOR

          # Download vendor blobs dari release
          gh release download v0.1 --repo cipin23/vendorgw -p "vendor_blobs.tar.gz" -D /tmp/ || true
          tar -xzf /tmp/vendor_blobs.tar.gz -C $DEVICE_VENDOR/ || true

          echo 'LOCAL_PATH := $(call my-dir)' > $DEVICE_VENDOR/Android.mk

          cat > $DEVICE_VENDOR/BoardConfigVendor.mk << 'EOF'
          PRODUCT_ENFORCE_VINTF_MANIFEST_OVERRIDE := true
          EOF

      - name: Check Storage Before Build
        run: df -h

      - name: Build system.img
        run: |
          cd /tmp/ARROW_SOURCE
          source build/envsetup.sh
          lunch arrow_a02-userdebug

          for i in {1..30}; do
            echo "=== Attempt $i ==="
            make systemimage -j$(nproc) 2>&1 | tee /tmp/build_system.log

            if grep -q "build completed successfully" /tmp/build_system.log; then
              echo "BUILD SUCCESS"
              break
            fi

            # Auto-fix: VINTF
            if grep -q "VINTF metadata found" /tmp/build_system.log; then
              sed -i '/vintf\//d' vendor/samsung/a02/a02-vendor.mk
              continue
            fi

            # Auto-fix: overriding .so
            CONFLICTS=$(grep "overriding commands" /tmp/build_system.log | sed "s/.*\/lib\///" | sed "s/\.so'.*//" | sort -u)
            if [ -n "$CONFLICTS" ]; then
              while IFS= read -r lib; do
                sed -i "/$lib/d" vendor/samsung/a02/Android.bp
                sed -i "/$lib/d" vendor/samsung/a02/a02-vendor.mk
              done <<< "$CONFLICTS"
              python3 -c "
          import re
          with open('vendor/samsung/a02/Android.bp','r') as f: c=f.read()
          blocks=re.split(r'\n(?=cc_prebuilt_library_shared)',c)
          clean=[b for b in blocks if ('name:' in b and 'srcs:' in b) or not b.startswith('cc_prebuilt')]
          open('vendor/samsung/a02/Android.bp','w').write('\n'.join(clean))
          "
              continue
            fi

            echo "Unknown error"
            tail -15 /tmp/build_system.log
            break
          done

      - name: Upload system.img
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1
          files: /tmp/ARROW_SOURCE/out/target/product/a02/system.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_system.log
